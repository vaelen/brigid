# Brigid example config — copy to ~/.config/brigid/config.toml and edit.

[brigid]
# Which model profile is active at startup (must name a [models.<name>] below).
# If omitted, the first defined profile is used.
default = "qwen"
# System-wide default Ollama host. Optional; each model may override it.
host    = "http://localhost:11434"

# --- Models ----------------------------------------------------------------
# Each [models.<name>] is a self-contained model profile. In the REPL, switch
# between them with `/model <name>`; `/model` with no argument lists them.
#   model         — the Ollama model id (defaults to the profile name if omitted)
#   options       — passed to Ollama (num_ctx, temperature, ...)
#   system_prompt — optional; replaces the active system prompt on switch
#   host          — optional; overrides [brigid].host for this profile only

[models.qwen]
model         = "qwen3.6:35b-a3b"
options       = { temperature = 0.7, num_ctx = 32768 }
# system_prompt = "You are a careful local agent. Prefer reading before writing."

[models.hermes]
model   = "hermes3-8b"
options = { temperature = 0.7, num_ctx = 32768 }

[runtime]
max_steps_per_turn   = 25
persist_permissions  = true   # write [permissions] back to this file on exit

[tools.fs]
# Built-in fs tools refuse to read/write outside this root. Use "/" to disable.
root = "."

[tools.bash]
timeout_seconds = 60

[tools.web]
max_bytes       = 200_000
timeout_seconds = 30

[permissions]
# Patterns are fnmatch globs over per-tool permission keys, e.g.
#   bash:git status*       fs.write:/Users/me/repos/**       web.fetch:https://docs.python.org/**
# Resolution order: deny first, then allow, then interactive prompt.
allow = [
    "fs.read:*",
    "fs.list:*",
    "bash:ls *",
    "bash:git status*",
    "bash:git diff*",
    "bash:git log*",
]
deny = [
    "bash:rm -rf *",
    "bash:sudo *",
    "fs.write:/etc/*",
]

# --- MCP servers -----------------------------------------------------------
# Each connected server's tools appear namespaced as `mcp.<name>.<tool>`.
# Use ${env:VAR} anywhere a string is expected to interpolate from the environment.

